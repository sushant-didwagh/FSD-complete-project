# ═══════════════════════════════════════════════════════════════
# Student Buddy — Production Overrides
# ═══════════════════════════════════════════════════════════════
#
# USAGE (always combine with base file):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# This file ONLY overrides production-specific settings.
# It is merged ON TOP of docker-compose.yml by Docker Compose.
# ═══════════════════════════════════════════════════════════════

services:

  # ── MongoDB (Production hardening) ───────────────────────────
  mongo:
    restart: always                    # Always restart (vs unless-stopped in dev)
    ports: []                          # ⚠️ Remove external port exposure in prod
                                       # MongoDB is only reachable inside Docker network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

  # ── Backend (Production hardening) ───────────────────────────
  backend:
    restart: always
    environment:
      NODE_ENV: production
      # In production, CLIENT_URL should be your actual domain
      CLIENT_URL: ${CLIENT_URL}
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/student_buddy?authSource=admin
    # Remove dev-friendly settings:
    # No bind mounts, no debug ports
    volumes:
      - uploads:/app/uploads           # Keep upload volume
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
volumes:
  uploads:
